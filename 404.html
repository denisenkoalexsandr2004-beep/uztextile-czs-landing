<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Страница не найдена — Центр Закупок Сетей: Текстиль</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{min-height:100vh;display:flex;align-items:center;justify-content:center;
      font-family:'Manrope','Segoe UI',system-ui,sans-serif;color:#fff;text-align:center;padding:24px;
      background:linear-gradient(135deg,#0c2235 0%,#0e2f3f 45%,#0a4a44 100%)}
    .box{max-width:520px}
    .code{font-size:clamp(72px,18vw,128px);font-weight:800;line-height:1;color:#E8CE8E;letter-spacing:-.03em}
    h1{font-size:clamp(20px,4vw,26px);font-weight:800;margin:8px 0 12px}
    p{color:rgba(255,255,255,.78);font-size:16px;margin-bottom:28px}
    a{display:inline-flex;align-items:center;gap:8px;background:#C8A24A;color:#3a2c08;
      font-weight:700;text-decoration:none;padding:14px 26px;border-radius:999px;transition:transform .2s,background .2s}
    a:hover{background:#E8CE8E;transform:translateY(-2px)}
  </style>
</head>
<body>
  <div class="box">
    <div class="code">404</div>
    <h1>Страница не найдена</h1>
    <p>Похоже, такой страницы нет. Вернитесь на главную страницу мероприятия.</p>
    <a href="/textile-uz/">На главную</a>
  </div>
</body>
</html>
