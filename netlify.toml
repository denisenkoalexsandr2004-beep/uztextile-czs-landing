# Netlify — статический сайт без сборки.
# Подключите GitHub-репозиторий в Netlify: New site → Import from GitHub → этот репо.
[build]
  publish = "."
  command = ""

# Кэш для статики (картинки/стили/скрипты)
[[headers]]
  for = "/img/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
